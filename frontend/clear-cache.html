<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>清除缓存 - Soul</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
    }
    .status {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .status-label {
      color: #666;
      font-size: 14px;
    }
    .status-value {
      font-weight: 600;
      font-size: 14px;
    }
    .status-value.success {
      color: #4caf50;
    }
    .status-value.error {
      color: #f44336;
    }
    .status-value.warning {
      color: #ff9800;
    }
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #333;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .log {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: #666;
    }
    .log-item {
      padding: 5px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .log-item:last-child {
      border-bottom: none;
    }
    .instructions {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 15px;
      margin-top: 20px;
      border-radius: 5px;
      font-size: 14px;
      color: #856404;
    }
    .instructions h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }
    .instructions ol {
      margin-left: 20px;
    }
    .instructions li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 清除缓存工具</h1>
    <p class="subtitle">解决iOS WebClip显示问题</p>
    
    <div class="status">
      <div class="status-item">
        <span class="status-label">Service Worker</span>
        <span class="status-value" id="sw-status">检测中...</span>
      </div>
      <div class="status-item">
        <span class="status-label">缓存数量</span>
        <span class="status-value" id="cache-count">检测中...</span>
      </div>
      <div class="status-item">
        <span class="status-label">设备类型</span>
        <span class="status-value" id="device-type">检测中...</span>
      </div>
      <div class="status-item">
        <span class="status-label">屏幕尺寸</span>
        <span class="status-value" id="screen-size">检测中...</span>
      </div>
    </div>
    
    <button class="btn btn-primary" id="clear-btn" onclick="clearAllCache()">
      🗑️ 清除所有缓存
    </button>
    
    <button class="btn btn-secondary" onclick="window.location.href='/'">
      🏠 返回首页
    </button>
    
    <div class="log" id="log"></div>
    
    <div class="instructions">
      <h3>📋 完整清除步骤：</h3>
      <ol>
        <li>点击上方"清除所有缓存"按钮</li>
        <li>完全关闭应用（双击Home键，向上滑动）</li>
        <li>打开"设置" → "Safari" → "清除历史记录与网站数据"</li>
        <li>长按桌面上的Soul图标，删除</li>
        <li>重新访问下载页，安装新的WebClip</li>
        <li>测试多次打开关闭应用</li>
      </ol>
    </div>
  </div>

  <script>
    const logs = [];
    
    function addLog(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      logs.push(`[${timestamp}] ${message}`);
      
      const logDiv = document.getElementById('log');
      const logItem = document.createElement('div');
      logItem.className = 'log-item';
      logItem.textContent = `[${timestamp}] ${message}`;
      logDiv.appendChild(logItem);
      logDiv.scrollTop = logDiv.scrollHeight;
      
      console.log(`[ClearCache] ${message}`);
    }
    
    async function detectStatus() {
      // 检测Service Worker
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        const swStatus = document.getElementById('sw-status');
        if (registrations.length > 0) {
          swStatus.textContent = `已注册 (${registrations.length}个)`;
          swStatus.className = 'status-value warning';
          addLog(`发现${registrations.length}个Service Worker`);
        } else {
          swStatus.textContent = '未注册';
          swStatus.className = 'status-value success';
          addLog('未发现Service Worker');
        }
      } else {
        document.getElementById('sw-status').textContent = '不支持';
        document.getElementById('sw-status').className = 'status-value error';
      }
      
      // 检测缓存
      if ('caches' in window) {
        const cacheNames = await caches.keys();
        const cacheCount = document.getElementById('cache-count');
        if (cacheNames.length > 0) {
          cacheCount.textContent = `${cacheNames.length}个缓存`;
          cacheCount.className = 'status-value warning';
          addLog(`发现${cacheNames.length}个缓存: ${cacheNames.join(', ')}`);
        } else {
          cacheCount.textContent = '无缓存';
          cacheCount.className = 'status-value success';
          addLog('未发现缓存');
        }
      }
      
      // 检测设备
      const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
      const deviceType = document.getElementById('device-type');
      if (isIOS) {
        const match = navigator.userAgent.match(/OS (\d+)_(\d+)_?(\d+)?/);
        const version = match ? `iOS ${match[1]}.${match[2]}` : 'iOS';
        deviceType.textContent = version;
        deviceType.className = 'status-value';
        addLog(`设备: ${version}`);
      } else {
        deviceType.textContent = '非iOS';
        deviceType.className = 'status-value';
        addLog('设备: 非iOS');
      }
      
      // 检测屏幕
      const screenSize = document.getElementById('screen-size');
      const width = window.screen.width;
      const height = window.screen.height;
      screenSize.textContent = `${height}x${width}`;
      screenSize.className = 'status-value';
      addLog(`屏幕尺寸: ${height}x${width}`);
    }
    
    async function clearAllCache() {
      const btn = document.getElementById('clear-btn');
      btn.disabled = true;
      btn.textContent = '清除中...';
      
      addLog('开始清除缓存...');
      
      try {
        // 1. 注销所有Service Worker
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const registration of registrations) {
            await registration.unregister();
            addLog(`已注销Service Worker: ${registration.scope}`);
          }
        }
        
        // 2. 删除所有缓存
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          for (const cacheName of cacheNames) {
            await caches.delete(cacheName);
            addLog(`已删除缓存: ${cacheName}`);
          }
        }
        
        // 3. 清除localStorage
        if (window.localStorage) {
          const count = localStorage.length;
          localStorage.clear();
          addLog(`已清除localStorage (${count}项)`);
        }
        
        // 4. 清除sessionStorage
        if (window.sessionStorage) {
          const count = sessionStorage.length;
          sessionStorage.clear();
          addLog(`已清除sessionStorage (${count}项)`);
        }
        
        // 5. 清除IndexedDB
        if (window.indexedDB) {
          const databases = await indexedDB.databases();
          for (const db of databases) {
            indexedDB.deleteDatabase(db.name);
            addLog(`已删除数据库: ${db.name}`);
          }
        }
        
        addLog('✅ 缓存清除完成！');
        addLog('请按照下方步骤完成清理');
        
        btn.textContent = '✅ 清除完成';
        btn.className = 'btn btn-primary';
        
        // 重新检测状态
        setTimeout(() => {
          detectStatus();
        }, 1000);
        
      } catch (error) {
        addLog(`❌ 清除失败: ${error.message}`);
        btn.textContent = '❌ 清除失败';
        btn.disabled = false;
      }
    }
    
    // 页面加载时检测状态
    window.addEventListener('load', () => {
      addLog('页面加载完成');
      detectStatus();
    });
  </script>
</body>
</html>
