# Video App 配置

# API 反向代理
location /api {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    client_max_body_size 0;
}

# 静态资源上传目录
location /uploads {
    alias /www/wwwroot/video-app/backend/uploads;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# 后端静态资源
location /static {
    alias /www/wwwroot/video-app/backend/static;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# WebSocket 支持
location /ws {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400;
}

# 前端 assets 目录 (JS/CSS)
location /assets {
    alias /www/wwwroot/video-app/frontend/dist/assets;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# 前端 images 目录
location /images {
    alias /www/wwwroot/video-app/frontend/dist/images;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# 前端静态文件 - 必须放在最后
location / {
    root /www/wwwroot/video-app/frontend/dist;
    index index.html;
    try_files $uri $uri/ /index.html;
}
